    <title>珍宝贝生日快乐</title>
    <style>
        body {
            display: block;
            margin: 0px;
            overflow: hidden;
        }
    
        #cake {
            display: block;
            position: relative;
            margin-top: calc(-10em - 100px);
            margin-bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
        }
    
        /* Happy Birthday 文字样式 */
        .birthday-text {
            position: fixed;
            bottom: 450px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Pacifico', 'Brush Script MT', cursive;
            font-size: 52px;
            color: #FFD700;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 10;
            -webkit-animation: fadeInText 1s 7s ease-out forwards;
            animation: fadeInText 1s 7s ease-out forwards;
            opacity: 0;
            white-space: nowrap;
        }
    
        /* 蛋糕插牌样式 */
        .cake-topper {
            position: fixed;
            top: calc(50% - 50px);
            left: 50%;
            transform: translateX(calc(-50% + 110px));
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B4513;
            font-family: 'KaiTi', '楷体', serif;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            border: 2px solid #8B4513;
            border-radius: 4px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4);
            z-index: 100;
            -webkit-animation: fadeInTopper 1s 6.5s ease-out forwards;
            animation: fadeInTopper 1s 6.5s ease-out forwards;
            opacity: 0;
            white-space: nowrap;
        }
    
        /* 插牌的支撑棒 */
        .cake-topper::before {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 50px;
            background: linear-gradient(to bottom, #8B4513, transparent);
        }
    
        /* ============================================== Candle
            */
    
        .bg {
            width: 100%;
            background: #FFB6D9;
            background: -webkit-linear-gradient(top left, #FFB6D9 0%, #FFB6D9 100%);
            background: linear-gradient(to bottom right, #FFB6D9 0%, #FFB6D9 100%);
        }
    
        .velas {
            background: #ffffff;
            border-radius: 20px;
            position: relative;
            top: 554px;
            margin-left: 49.5%;
            width: 10px;
            height: 70px;
            -webkit-transform: translateY(-600px);
            -ms-transform: translateY(-600px);
            transform: translateY(-600px);
            -webkit-backface-visibility: hidden;
            -ms-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-animation: in 500ms 6s ease-out forwards;
            animation: in 500ms 6s ease-out forwards;
        }
    
        .velas:after,
        .velas:before {
            background: rgba(255, 0, 0, 0.4);
            content: "";
            position: absolute;
            width: 100%;
            height: 4.44444444px;
        }
    
        .velas:after {
            top: 25%;
            left: 0;
        }
    
        .velas:before {
            top: 45%;
            left: 0;
        }
    
    
        /* ============================================== Fire
            */
    
        .fuego {
            border-radius: 100%;
            position: absolute;
            top: -40px;
            left: 70%;
            margin-left: -4.4px;
            width: 13.33333334px;
            height: 36px;
        }
    
        .fuego:nth-child(1) {
            -webkit-animation: fuego 2s 6.5s infinite;
            animation: fuego 2s 6.5s infinite;
        }
    
        .fuego:nth-child(2) {
            -webkit-animation: fuego 1.5s 6.5s infinite;
            animation: fuego 1.5s 6.5s infinite;
        }
    
        .fuego:nth-child(3) {
            -webkit-animation: fuego 1s 6.5s infinite;
            animation: fuego 1s 6.5s infinite;
        }
    
        .fuego:nth-child(4) {
            -webkit-animation: fuego 0.5s 6.5s infinite;
            animation: fuego 0.5s 6.5s infinite;
        }
    
        .fuego:nth-child(5) {
            -webkit-animation: fuego 0.2s 6.5s infinite;
            animation: fuego 0.2s 6.5s infinite;
        }
    
    
        /* ============================================== Animation Fire
            */
    
        @-webkit-keyframes fuego {
    
            0%,
            100% {
                background: rgba(254, 248, 97, 0.5);
                -webkit-box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
                box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
                -webkit-transform: translateY(0) scale(1);
                transform: translateY(0) scale(1);
            }
    
            50% {
                background: rgba(255, 50, 0, 0.1);
                -webkit-box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
                box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
                -webkit-transform: translateY(-20px) scale(0);
                transform: translateY(-20px) scale(0);
            }
        }
    
        @keyframes fuego {
    
            0%,
            100% {
                background: rgba(254, 248, 97, 0.5);
                -webkit-box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
                box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2);
                -webkit-transform: translateY(0) scale(1);
                transform: translateY(0) scale(1);
            }
    
            50% {
                background: rgba(255, 50, 0, 0.1);
                -webkit-box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
                box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2);
                -webkit-transform: translateY(-20px) scale(0);
                transform: translateY(-20px) scale(0);
            }
        }
    
        @-webkit-keyframes in {
            to {
                -webkit-transform: translateY(0);
                transform: translateY(0);
            }
        }
    
        @keyframes in {
            to {
                -webkit-transform: translateY(0);
                transform: translateY(0);
            }
        }
    
        .come {
            animation-delay: 0.4s;
            animation: coming 2s;
            opacity: 1;
        }
    
        @keyframes coming {
            from {
                opacity: 0;
            }
    
            to {
                opacity: 1;
            }
        }
    
        @-webkit-keyframes coming {
            from {
                opacity: 0;
            }
    
            to {
                opacity: 1;
            }
        }

        @-webkit-keyframes square {
            0% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
            }
    
            100% {
                -webkit-transform: translateY(-900px) rotate(600deg);
                transform: translateY(-900px) rotate(600deg);
            }
        }
    
        @keyframes square {
            0% {
                -webkit-transform: translateY(0);
                transform: translateY(0);
            }
    
            100% {
                -webkit-transform: translateY(-900px) rotate(600deg);
                transform: translateY(-900px) rotate(600deg);
            }
        }
    
        .happy {
            position: absolute;
            left: 41%;
            top: 49%;
            opacity: 1;
            animation: happybirthdays 10s;
            animation-delay: 0s;
        }
    
        @keyframes happybirthdays {
            0% {
                position: absolute;
                top: 45%;
                opacity: 0;
            }
    
            70% {
                position: absolute;
                top: 45%;
                opacity: 0;
            }
    
            100% {
                position: absolute;
                top: 49%;
                opacity: 1;
            }
        }
    
        @-webkit-keyframes happybirthdays {
            0% {
                position: absolute;
                top: 45%;
                opacity: 0;
            }
    
            70% {
                position: absolute;
                top: 45%;
                opacity: 0;
            }
    
            100% {
                position: absolute;
                top: 49%;
                opacity: 1;
            }
        }
    
        .button-style1,
        .button-style2 {
            position: absolute;
            top: 70%;
            opacity: 1;
            z-index: 100;
        }
    
        .button-style1 {
            position: absolute;
            left: 43%;
            animation: btn1 15s;
        }
    
        .button-style2 {
            position: absolute;
            left: 68%;
            animation: btn2 15s;
        }
    
        @keyframes btn1 {
            0% {
                opacity: 0;
                left: 43.5%;
            }
    
            70% {
                opacity: 0;
                left: 43.5%;
            }
    
            100% {
                opacity: 1;
                left: 43.5%;
            }
        }
    
        @-webkit-keyframes btn1 {
            0% {
                opacity: 0;
                left: 43.5%;
            }
    
            70% {
                opacity: 0;
                left: 43.5%;
            }
    
            100% {
                opacity: 1;
                left: 43.5%;
            }
        }
    
        @keyframes btn2 {
            0% {
                opacity: 0;
                left: 43.5%;
            }
    
            70% {
                opacity: 0;
                left: 43.5%;
            }
    
            100% {
                opacity: 1;
                left: 68%;
            }
        }
    
        @-webkit-keyframes btn2 {
            0% {
                opacity: 0;
                left: 43.5%;
            }
    
            70% {
                opacity: 0;
                left: 43.5%;
            }
    
            100% {
                opacity: 1;
                left: 68%;
            }
        }
    
        .lk1,
        .lk2 {
            text-decoration: none;
            font-family: Microsoft YaHei;
            color: #fff;
            transition: all 0.5s;
        }
    
        .link1,
        .link2 {
            width: 170px;
            height: 60px;
            border: 2px solid #fff;
            -webkit-border: 1px solid #fff;
            border-radius: 30px;
            font-size: 23px;
            text-align: center;
            background: #FFB6D9;
            transition: all 0.8s;
        }
    
        .link2 {
            cursor: not-allowed;
        }
    
        .bt1,
        .bt2 {
            position: relative;
            top: 22%;
            vertical-align: middle;
        }
    
        a.lk1:hover {
            color: #FFB6D9;
            transition: all 0.5s;
        }
    
        .link1:hover {
            background-color: #fff;
            background-color: rgba(255, 255, 255, 0, 2);
            border: 2px solid #BBB;
            transition: all 0.8s;
        }
    
        a.lk2:hover {
            color: #FFB6D9;
            transition: all 0.5s;
        }
    
        .link2:hover {
            background-color: #fff;
            background-color: rgba(255, 255, 255, 0, 2);
            border: 2px solid #BBB;
            transition: all 0.8s;
        }
    
        /* 喜欢/不喜欢按钮样式 */
        .action-buttons {
            position: fixed;
            bottom: 230px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 300px;
            z-index: 1000;
            animation: fadeInButtons 1s ease-in;
        }
    
        @keyframes fadeInButtons {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
    
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    
        .btn-like,
        .btn-dislike {
            padding: 15px 40px;
            font-size: 20px;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            font-weight: 500;
            border: 3px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            backdrop-filter: blur(10px);
        }
    
        .btn-like {
            background: linear-gradient(135deg, rgba(255, 107, 129, 0.8), rgba(255, 142, 83, 0.8));
        }
    
        .btn-like:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 107, 129, 0.5);
            background: linear-gradient(135deg, rgba(255, 107, 129, 1), rgba(255, 142, 83, 1));
        }
    
        .btn-dislike {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
        }
    
        .btn-dislike:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    
        /* 滚动提示样式 */
        .scroll-hint {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 999;
            animation: fadeInHint 1s ease;
        }
    
        .scroll-hint p {
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
    
        .arrow-down {
            width: 15px;
            height: 15px;
            border-right: 2px solid white;
            border-bottom: 2px solid white;
            transform: rotate(45deg);
            margin: 0 auto;
            animation: arrowBounce 1.5s infinite;
        }
    
        @keyframes arrowBounce {
            0% {
                transform: rotate(45deg) translate(0, 0);
                opacity: 0;
            }
    
            50% {
                opacity: 1;
            }
    
            100% {
                transform: rotate(45deg) translate(10px, 10px);
                opacity: 0;
            }
        }
    
        @keyframes fadeInHint {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
    
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    
        /* fadeInText动画 - 用于Happy Birthday文字 */
        @keyframes fadeInText {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px) scale(0.8);
            }
    
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
    
        /* fadeInTopper动画 - 用于插牌 */
        @keyframes fadeInTopper {
            from {
                opacity: 0;
                transform: translateX(calc(-50% + 110px)) scale(0.8);
            }
    
            to {
                opacity: 1;
                transform: translateX(calc(-50% + 110px)) scale(1);
            }
        }
    </style>

    <script>
        // 蛋糕页面交互逻辑
        $(document).ready(function () {
            // 蛋糕动画持续时间约11秒（根据CSS动画时长计算）
            // 在动画完成后立即显示按钮和滚动提示
            setTimeout(function () {
                $('#actionButtons').fadeIn(800);
                $('#scrollHint').fadeIn(800);
            }, 11000); // 11秒后显示按钮和滚动提示

            // 喜欢按钮点击事件 - 直接跳转到时光页
            $('#btnLike').click(function () {
                // 直接跳转到时光页，不显示提示
                window.location.href = 'memories.html';
            });

            // 不喜欢按钮点击事件
            $('#btnDislike').click(function () {
                // 显示友好提示
                showMessage('哎呀~ 😢 没关系，我们继续看看其他的吧！', 'info');

                // 延迟后跳转到时光页
                setTimeout(function () {
                    // 跳转到时光页（文字动画页面）
                    window.location.href = 'main.html';
                }, 2500);
            });

            // 添加滚动监听 - 向下滚动进入时光页
            var lastScrollTop = 0;
            var scrollThreshold = 50; // 滚动阈值
            var isScrolling = false;

            $(window).on('wheel', function (e) {
                if (isScrolling) return;

                var deltaY = e.originalEvent.deltaY;

                // 向下滚动
                if (deltaY > scrollThreshold) {
                    isScrolling = true;
                    // 添加淡出效果
                    $('body').fadeOut(500, function () {
                        window.location.href = 'memories.html';
                    });
                }
            });

            // 触摸设备支持
            var touchStartY = 0;
            $(document).on('touchstart', function (e) {
                touchStartY = e.originalEvent.touches[0].clientY;
            });

            $(document).on('touchmove', function (e) {
                if (isScrolling) return;

                var touchEndY = e.originalEvent.touches[0].clientY;
                var deltaY = touchStartY - touchEndY;

                // 向上滑动（手指向上移动）
                if (deltaY > scrollThreshold) {
                    isScrolling = true;
                    $('body').fadeOut(500, function () {
                        window.location.href = 'memories.html';
                    });
                }
            });
        });

        // 显示消息提示函数
        function showMessage(message, type) {
            // 创建消息元素
            var messageDiv = $('<div></div>')
                .addClass('message-toast')
                .addClass('message-' + type)
                .text(message)
                .css({
                    'position': 'fixed',
                    'top': '50%',
                    'left': '50%',
                    'transform': 'translate(-50%, -50%)',
                    'background': type === 'success'
                        ? 'linear-gradient(135deg, rgba(255, 107, 129, 0.95), rgba(255, 142, 83, 0.95))'
                        : 'linear-gradient(135deg, rgba(121, 168, 174, 0.95), rgba(107, 156, 160, 0.95))',
                    'color': '#fff',
                    'padding': '25px 50px',
                    'border-radius': '50px',
                    'font-size': '24px',
                    'font-family': 'Microsoft YaHei',
                    'font-weight': '500',
                    'box-shadow': '0 10px 40px rgba(0, 0, 0, 0.3)',
                    'z-index': '10000',
                    'opacity': '0',
                    'transition': 'all 0.5s ease'
                });

            // 添加到页面

    <script>
        // 全局音乐管理器 - 使用localStorage实现跨页面音乐连续播放 
            (function () {
                'use strict';  

                var MUSIC_TIME_KEY = 'birthdayMusicTime';
                var MUSIC_PLAYING_KEY = 'birthdayMusicPlaying';
                var MUSIC_SESSION_KEY = 'birthdayMusicSession';  

                // 初始化音乐
                function initMusic() {
                    var audio = document.querySelector('audio');
                    if (!audio) return;

                    // 设置预加载
                    audio.preload = 'auto';

                    // 检查是否是第一页（蛋糕页）
                    var isFirstPage = audio.getAttribute('data-first-page') === 'true';

                    // 检查是否是新的会话（从倒计时结束后第一次进入）
                    var currentSession = sessionStorage.getItem(MUSIC_SESSION_KEY);
                    var isNewSession = !currentSession;

                    // 如果是第一页且是新会话，清空播放记录
                    if (isFirstPage && isNewSession) {
                        // 新会话：清空之前的播放记录，从头开始
                        localStorage.removeItem(MUSIC_TIME_KEY);
                        localStorage.setItem(MUSIC_PLAYING_KEY, 'true');
                        sessionStorage.setItem(MUSIC_SESSION_KEY, 'active');
                    } else if (!isFirstPage && isNewSession) {
                        // 如果不是第一页但是新会话，标记会话已激活
                        sessionStorage.setItem(MUSIC_SESSION_KEY, 'active');
                    }

                    // 获取保存的播放位置
                    var savedTime = parseFloat(localStorage.getItem(MUSIC_TIME_KEY) || '0');
                    var wasPlaying = localStorage.getItem(MUSIC_PLAYING_KEY);

                    // 音频加载完成后立即恢复播放
                    function tryRestore() {
                        // 恢复播放位置（如果是第一页的新会话，savedTime为0，从头播放）
                        if (savedTime > 0 && !(isFirstPage && isNewSession)) {
                            audio.currentTime = savedTime;
                        }

                        // 自动播放：如果之前在播放，或者是第一页的新会话
                        if (wasPlaying === 'true' || (isFirstPage && isNewSession)) {
                            var playPromise = audio.play();
                            if (playPromise !== undefined) {
                                playPromise.then(function () {
                                    localStorage.setItem(MUSIC_PLAYING_KEY, 'true');
                                }).catch(function (error) {
                                    console.log('音乐播放失败:', error);
                                });
                            }
                        }
                    }

                    // 如果音频已经加载足够数据，立即恢复
                    if (audio.readyState >= 2) {
                        tryRestore();
                    } else {
                        // 否则等待数据加载
                        audio.addEventListener('canplay', function () {
                            tryRestore();
                        }, { once: true });
                    }

                    // 高频率保存播放时间，每50ms保存一次
                    var lastSaveTime = 0;
                    function saveProgress() {
                        if (audio && !audio.paused) {
                            var now = Date.now();
                            if (now - lastSaveTime > 50) {
                                localStorage.setItem(MUSIC_TIME_KEY, audio.currentTime.toString());
                                lastSaveTime = now;
                            }
                        }
                        requestAnimationFrame(saveProgress);
                    }
                    requestAnimationFrame(saveProgress);

                    // 监听播放和暂停事件
                    audio.addEventListener('play', function () {
                        localStorage.setItem(MUSIC_PLAYING_KEY, 'true');
                    });

                    audio.addEventListener('pause', function () {
                        localStorage.setItem(MUSIC_PLAYING_KEY, 'false');
                    });

                    // 页面即将卸载时立即保存
                    window.addEventListener('beforeunload', function () {
                        if (audio && !audio.paused) {
                            localStorage.setItem(MUSIC_TIME_KEY, audio.currentTime.toString());
                            localStorage.setItem(MUSIC_PLAYING_KEY, 'true');
                        }
                    });

                    // 使用pagehide作为备用
                    window.addEventListener('pagehide', function () {
                        if (audio && !audio.paused) {
                            localStorage.setItem(MUSIC_TIME_KEY, audio.currentTime.toString());
                            localStorage.setItem(MUSIC_PLAYING_KEY, 'true');
                        }
                    }, false);

                    // 页面可见性改变时的处理
                    document.addEventListener('visibilitychange', function () {
                        if (!document.hidden && audio) {
                            var shouldPlay = localStorage.getItem(MUSIC_PLAYING_KEY) === 'true';
                            if (shouldPlay && audio.paused) {
                                audio.play().catch(function (error) {
                                    console.log('恢复播放失败');
                                });
                            }
                        }
                    });
                }

                // 页面加载完成后初始化
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', initMusic);
                } else {
                    initMusic();
                }
            })();

    </script>
