<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐</title>
    <!-- <link rel="stylesheet" href="../css/login.css"> -->
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Microsoft YaHei', Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #FFB6D9;
    background: linear-gradient(135deg, #FFB6D9 0%, #FFA0C8 100%);
    overflow: hidden;
}

.login-container {
    background: rgba(255, 255, 255, 0.95);
    padding: 50px 60px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    text-align: center;
    min-width: 400px;
    animation: fadeIn 0.8s ease-in;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.title {
    color: #333;
    font-size: 42px;
    margin-bottom: 40px;
    font-weight: 500;
    letter-spacing: 3px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.input-field {
    padding: 16px 20px;
    font-size: 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    outline: none;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.8);
}

.input-field::placeholder {
    color: #999;
}

.input-field:focus {
    border-color: #FFB6D9;
    background: rgba(255, 255, 255, 1);
    box-shadow: 0 0 10px rgba(255, 182, 217, 0.3);
}

.login-btn {
    padding: 16px;
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    background: linear-gradient(135deg, #FFB6D9 0%, #FFA0C8 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 2px;
    margin-top: 10px;
}

.login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 182, 217, 0.4);
}

.login-btn:active {
    transform: translateY(0);
}

/* 响应式设计 */
@media (max-width: 600px) {
    .login-container {
        min-width: 320px;
        padding: 40px 30px;
    }
    
    .title {
        font-size: 32px;
    }
}

    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="title">生日快乐</h1>
        <form id="loginForm" class="login-form">
            <input type="text" id="username" class="input-field" placeholder="请输入你真实的名字" required>
            <input type="password" id="password" class="input-field" placeholder="请输入你喜欢的数字" required>
            <button type="submit" class="login-btn">进入</button>
        </form>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
                const loginForm = document.getElementById('loginForm');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');

                // 表单提交事件
                loginForm.addEventListener('submit', function (e) {
                    e.preventDefault();

                    const username = usernameInput.value.trim();
                    const password = passwordInput.value.trim();

                    // 简单验证 - 只要输入了内容就可以进入
                    if (username && password) {
                        // 保存用户名到localStorage，供其他页面使用
                        localStorage.setItem('userName', username);

                        // 添加淡出动画
                        document.querySelector('.login-container').style.animation = 'fadeOut 0.5s ease-out';

                        // 延迟跳转以显示动画效果
                        setTimeout(function () {
                            window.location.href = 'main.html';
                        }, 500);
                    } else {
                        alert('请输入名字和数字！');
                    }
                });

                // 回车键提交
                passwordInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        loginForm.dispatchEvent(new Event('submit'));
                    }
                });
            });

            // 添加淡出动画
            const style = document.createElement('style');
            style.textContent = `
    @keyframes fadeOut {
        from {
            opacity: 1;
            transform: translateY(0);
        }
        to {
            opacity: 0;
            transform: translateY(-30px);
        }
    }
`;
            document.head.appendChild(style);

    </script>
</body>
</html>
